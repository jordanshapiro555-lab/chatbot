<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>My Chatbot</title>
    <style>
      body { font-family: system-ui; max-width: 720px; margin: 40px auto; padding: 0 16px; }
      #log { border: 1px solid #ddd; border-radius: 12px; padding: 12px; min-height: 260px; }
      .msg { margin: 10px 0; line-height: 1.35; }
      .me { font-weight: 700; }
      .bot { font-weight: 700; }
      .bubble { white-space: pre-wrap; }
      form { display: flex; gap: 8px; margin-top: 12px; }
      input { flex: 1; padding: 10px 12px; border-radius: 10px; border: 1px solid #ccc; }
      button { padding: 10px 14px; border-radius: 10px; border: 1px solid #ccc; background: #fff; cursor: pointer; }
      button:disabled { opacity: .6; cursor: not-allowed; }
    </style>
  </head>
  <body>
    <h1>My Chatbot</h1>
    <div id="log"></div>

    <form id="chat">
      <input id="text" placeholder="Ask something..." autocomplete="off" />
      <button id="send" type="submit">Send</button>
    </form>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const WORKER_URL = "https://chatbot.jordanshapiro555.workers.dev";

        const log = document.getElementById("log");
        const form = document.getElementById("chat");
        const input = document.getElementById("text");
        const btn = document.getElementById("send");

        const messages = [
          { role: "system", content: "You are a helpful, concise assistant." }
        ];

        function addLine(label, text, cls) {
          const div = document.createElement("div");
          div.className = "msg";
          div.innerHTML = `<span class="${cls}">${label}:</span> <span class="bubble"></span>`;
          const bubble = div.querySelector(".bubble");
          bubble.textContent = text || "";
          log.appendChild(div);
          log.scrollTop = log.scrollHeight;
          return bubble; // for streaming updates
        }

        // Read SSE stream and extract "data:" chunks.
        // If data is JSON, we try to pull token fields; otherwise we append raw text.
        async function readSSE(stream, onChunk) {
          const reader = stream.getReader();
          const decoder = new TextDecoder();
          let buffer = "";

          while (true) {
            const { value, done } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });

            // SSE events separated by blank line
            const parts = buffer.split("\n\n");
            buffer = parts.pop() || "";

            for (const part of parts) {
              const lines = part.split("\n");
              for (const line of lines) {
                const trimmed = line.trim();
                if (!trimmed.startsWith("data:")) continue;

                const payload = trimmed.slice(5).trim();
                if (!payload || payload === "[DONE]") continue;

                // Try JSON token shapes first
                try {
                  const obj = JSON.parse(payload);
                  const token =
                    obj?.response ??
                    obj?.delta ??
                    obj?.token ??
                    obj?.text ??
                    obj?.choices?.[0]?.delta?.content ??
                    obj?.choices?.[0]?.text;

                  if (token) onChunk(String(token));
                  else onChunk(payload);
                } catch {
                  // Not JSON: append as-is
                  onChunk(payload);
                }
              }
            }
          }
        }

        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          const text = input.value.trim();
          if (!text) return;

          btn.disabled = true;

          addLine("You", text, "me");
          messages.push({ role: "user", content: text });
          input.value = "";

          const botBubble = addLine("Bot", "", "bot");

          try {
            const res = await fetch(WORKER_URL, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ messages }),
            });

            const contentType = res.headers.get("content-type") || "";

            // If JSON (debug_kb or errors), show it directly
            if (contentType.includes("application/json")) {
              const data = await res.json();
              const pretty = typeof data === "string" ? data : JSON.stringify(data, null, 2);
              botBubble.textContent = pretty;
              messages.push({ role: "assistant", content: pretty });
              btn.disabled = false;
              return;
            }

            // Otherwise treat as streaming SSE
            if (!res.ok) {
              const raw = await res.text();
              botBubble.textContent = `Error ${res.status}: ${raw}`;
              btn.disabled = false;
              return;
            }

            let full = "";
            await readSSE(res.body, (chunk) => {
              full += chunk;
              botBubble.textContent = full;
              log.scrollTop = log.scrollHeight;
            });

            messages.push({ role: "assistant", content: full || botBubble.textContent });
          } catch (err) {
            botBubble.textContent = `Fetch failed: ${err}`;
          } finally {
            btn.disabled = false;
          }
        });
      });
    </script>
  </body>
</html>
