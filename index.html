<script>
document.addEventListener("DOMContentLoaded", () => {
  const WORKER_URL = "https://chatbot.jordanshapiro555.workers.dev";

  const log = document.getElementById("log");
  const form = document.getElementById("chat");
  const input = document.getElementById("text");

  if (!log || !form || !input) {
    console.error("Missing required elements:", { log, form, input });
    return;
  }

  const messages = [
    { role: "system", content: "You are a helpful, concise assistant." }
  ];

  function addLine(label, text, cls) {
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.innerHTML = `<span class="${cls === "me" ? "me" : "bot"}">${label}:</span> ${text}`;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;

    addLine("You", text, "me");
    messages.push({ role: "user", content: text });
    input.value = "";

    try {
      const res = await fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages }),
      });

      const raw = await res.text();
      if (!res.ok) {
        addLine("Bot", `Error ${res.status}: ${raw}`, "bot");
        return;
      }

      const data = JSON.parse(raw);
      const reply =
        data.response ??
        data.result?.response ??
        data.result ??
        data?.choices?.[0]?.message?.content ??
        JSON.stringify(data);

      addLine("Bot", reply, "bot");
      messages.push({ role: "assistant", content: reply });
    } catch (err) {
      addLine("Bot", `Fetch failed: ${err}`, "bot");
    }
  });
});
</script>
